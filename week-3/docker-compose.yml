services:
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: taskspass
      POSTGRES_DB: tasksdb
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks -d tasksdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      STORAGE: postgres
      DATABASE_URL: postgres://tasks:taskspass@db:5432/tasksdb
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
